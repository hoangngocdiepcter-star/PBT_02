<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Đăng ký tài khoản E-Commerce — Form đăng ký với validation HTML5"
    />
    <title>Đăng ký Tài khoản</title>
  </head>
  
  <body>
    <header class="card-header">
      <h1>Đăng ký Tài khoản </h1>
      <p>Tạo tài khoản để trải nghiệm mua sắm tuyệt vời</p>
    </header>
    <section class="register">
      <form action="#" method="POST" novalidate>
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
          <legend>Thông tin cá nhân</legend>

          <label for="fullname">
            Họ và tên <span class="required">*</span>
          </label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            required
            minlength="2"
            maxlength="50"
            placeholder="Nhập họ và tên đầy đủ (2-50 ký tự)"
            autocomplete="name"
          />

          <label for="email"> Email <span class="required">*</span> </label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="vidu@email.com"
            autocomplete="email"
          />

          <label for="phone">
            Số điện thoại <span class="required">*</span>
          </label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            pattern="[0-9]{10}"
            title="Vui lòng nhập đúng 10 chữ số"
            placeholder="0123456789 (10 chữ số)"
            autocomplete="tel"
          />

          <label for="birthday">
            Ngày sinh <span class="required">*</span>
          </label>
          <input
            type="date"
            id="birthday"
            name="birthday"
            required
            max=""
            title="Chọn ngày sinh (không được chọn ngày tương lai)"
            placeholder="YYYY-MM-DD"
          />
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
          <legend>Tài khoản</legend>

          <label for="username">
            Tên đăng nhập <span class="required">*</span>
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            pattern="[a-zA-Z0-9_]{3,20}"
            title="Chỉ chấp nhận chữ cái, số và dấu gạch dưới (3-20 ký tự)"
            placeholder="username_123 (3-20 ký tự)"
            autocomplete="username"
          />

          <label for="password">
            Mật khẩu <span class="required">*</span>
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
            title="Mật khẩu tối thiểu 8 ký tự, ít nhất 1 chữ hoa và 1 chữ số"
            placeholder="Nhập mật khẩu (≥8 ký tự, 1 chữ hoa, 1 số)"
            autocomplete="new-password"
          />

          <label for="confirm_password">
            Xác nhận mật khẩu <span class="required">*</span>
          </label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            required
            minlength="8"
            pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
            title="Mật khẩu tối thiểu 8 ký tự, ít nhất 1 chữ hoa và 1 chữ số"
            placeholder="Nhập lại mật khẩu để xác nhận"
            autocomplete="new-password"
          />
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
          <legend>Thông tin giao hàng</legend>

          <label for="city">
            Tỉnh / Thành phố <span class="required">*</span>
          </label>
          <select id="city" name="city" required>
            <option value="" disabled selected>
              -- Chọn tỉnh/thành phố --
            </option>
            <option value="hanoi">Hà Nội</option>
            <option value="hochiminh">Hồ Chí Minh</option>
            <option value="danang">Đà Nẵng</option>
            <option value="haiphong">Hải Phòng</option>
            <option value="cantho">Cần Thơ</option>
            <option value="hue">Thừa Thiên Huế</option>
            <option value="khac">Tỉnh/Thành khác</option>
          </select>

          <label for="district">
            Quận / Huyện <span class="required">*</span>
          </label>
          <select id="district" name="district" required>
            <option value="" disabled selected>-- Chọn phường --</option>
            <option value="q1">Phường Tây Hồ</option>
            <option value="q2">Phường Hoàn Kiếm</option>
            <option value="q3">Phường Ba Đình</option>
            <option value="q4">Phường Nhật Tân</option>
            <option value="q5">Phường Phú Thượng</option>
          </select>

          <label for="address">
            Địa chỉ chi tiết <span class="required">*</span>
          </label>
          <textarea
            id="address"
            name="address"
            rows="3"
            required
            placeholder="Nhập số nhà, đường, phường/xã..."
          ></textarea>

          <label>Giới tính <span class="required">*</span></label>
          <div class="radio-group">
            <div class="radio-item">
              <input
                type="radio"
                id="male"
                name="gender"
                value="male"
                required
              />
              <label for="male">Nam</label>
            </div>
            <div class="radio-item">
              <input
                type="radio"
                id="female"
                name="gender"
                value="female"
                required
              />
              <label for="female">Nữ</label>
            </div>
            <div class="radio-item">
              <input
                type="radio"
                id="other"
                name="gender"
                value="other"
                required
              />
              <label for="other">Khác</label>
            </div>
          </div>

          <div class="checkbox-item" style="margin-bottom: 1rem">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">
              Tôi đồng ý với <a href="#">điều khoản sử dụng</a> và
              <a href="#">chính sách bảo mật</a>
            </label>
          </div>
        </fieldset>

        <!-- Buttons -->
        <div class="btn-group">
          <button type="submit">
            Đăng ký ngay
          </button>
          <button type="reset">Làm mới</button>
        </div>
      </form>

      <p>
        Đã có tài khoản? <a href="#">Đăng nhập ngay</a>
      </p>
    </section>
  </body>
</html>
